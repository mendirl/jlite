#====================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
#====================================================================

spring.application.name=JhLiteApplication
logging.level.io.mendirl.jhlite=INFO

application.exception.package=org.,java.,net.,jakarta.,com.,io.,de.,tech.jhipster.lite,io.mendirl.jhlite
jhlite-hidden-resources.tags=banner
server.port=8080
spring.jackson.default-property-inclusion=non_null
jhlite-hidden-resources.slugs=custom-jhlite
spring.datasource.hikari.poolName=Hikari
spring.data.jpa.repositories.bootstrap-mode=deferred
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_updates=true
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
spring.jpa.open-in-view=false
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=jhLiteApplication
spring.datasource.url=jdbc:postgresql://localhost:5432/jhLiteApplication
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.order_inserts=true
spring.datasource.hikari.auto-commit=false
spring.datasource.type=com.zaxxer.hikari.HikariDataSource
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
spring.task.scheduling.thread-name-prefix=jhLiteApplication-scheduling-
spring.task.execution.pool.keep-alive=10s
spring.task.execution.pool.queue-capacity=100
spring.task.scheduling.pool.size=2
spring.task.execution.pool.max-size=16
spring.task.execution.thread-name-prefix=jhLiteApplication-task-
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
management.endpoints.web.base-path=/management
management.endpoints.web.exposure.include=configprops,env,health,info,logfile,loggers,threaddump
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always
spring.security.oauth2.client.registration.oidc.scope=openid,profile,email