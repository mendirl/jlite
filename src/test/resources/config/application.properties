#====================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
#====================================================================

spring.main.banner-mode=off

# Logging configuration
logging.level.io.mendirl.jhlite=OFF
logging.config=classpath:logback.xml

application.exception.package=org.,java.,net.,jakarta.,com.,io.,de.,tech.jhipster.lite,io.mendirl.jhlite
server.port=0
spring.main.allow-bean-definition-overriding=true
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.jpa.open-in-view=false
spring.datasource.username=jhLiteApplication
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.url=jdbc:tc:postgresql:15.1:///jhLiteApplication?TC_TMPFS=/testtmpfs:rw
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.datasource.hikari.auto-commit=false
spring.datasource.password=
spring.security.oauth2.client.provider.oidc.issuer-uri=http://DO_NOT_CALL:9080/realms/jhipster

spring.security.oauth2.client.registration.oidc.client-id=web_app